<div class="acquista-container">
    <h1>ACQUISTA </h1>
    <p>Compila il modulo per completare il tuo ordine. Ti risponderemo al più presto!</p>

    <form action="mailto:info@z&emoda.com" method="post" enctype="text/plain">
        <label for="prodotto">Nome del prodotto</label>
        <input type="text" id="prodotto" name="prodotto" placeholder="Es: Eleganza Bianca 1" required>

        <label for="taglia">Taglia</label>
        <input type="text" id="taglia" name="taglia" placeholder="Es: S, M, L, XL" required>

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>

        <label for="cognome">Cognome</label>
        <input type="text" id="cognome" name="cognome" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="telefono">Telefono</label>
        <input type="tel" id="telefono" name="telefono">

        <label for="indirizzo">Indirizzo di spedizione</label>
        <textarea id="indirizzo" name="indirizzo" rows="3" required></textarea>

        <label for="messaggio">Messaggio o note aggiuntive</label>
        <textarea id="messaggio" name="messaggio" rows="4"></textarea>

        <button type="submit">Invia Ordine</button>
    </form>
</div>
